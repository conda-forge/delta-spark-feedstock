{% set name = "delta-spark" %}
{% set version = "4.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/delta-io/delta/archive/refs/tags/v{{ version }}.tar.gz
  sha256: fc3c0e9d4466b81cdbd981eb67d4caa6fc0fdc9917058ce029fba34ecb502ff6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9
    - pyspark >=4.0.0,<4.1.0
    - importlib-metadata >=1.0.0

test:
  imports:
    - delta
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/delta-io/delta/
  summary: Python APIs for using Delta Lake with Apache Spark
  license: Apache-2.0
  license_file:
    - NOTICE.txt
    - LICENSE.txt
  doc_url: https://docs.delta.io
  dev_url: https://github.com/delta-io/delta

extra:
  recipe-maintainers:
    - scottsand-db
    - allisonport-db
    - nkarpov
